</section>

<script>
  const params = new URLSearchParams(window.location.search);

  const doc = params.get("doc");
  const titulo = params.get("titulo");

  if (doc) {
    document.getElementById("visor").src = "documentos/" + doc;
    document.getElementById("descarga").href = "documentos/" + doc;
  }

  if (titulo) {
    document.getElementById("tituloDoc").textContent = titulo;
  }
</script>
